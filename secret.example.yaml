apiVersion: v1
kind: Secret
metadata:
  name: catalog-secrets
  namespace: autoflow
type: Opaque
stringData:
  NODE_ENV: production
  PORT: "3003"
  LOG_LEVEL: info

  # MongoDB próprio (StatefulSet) — DNS interno
  MONGODB_URI: "mongodb://catalog_admin:REPLACE_ME@mongodb-catalog.autoflow.svc.cluster.local:27017/catalog?authSource=admin"

  # RabbitMQ shared
  RABBITMQ_URL: "amqp://admin:REPLACE_ME@rabbitmq.autoflow.svc.cluster.local:5672"
  RABBITMQ_PREFETCH: "10"

  CORRELATION_ID_HEADER: x-correlation-id
