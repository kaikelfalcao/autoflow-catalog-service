name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  NODE_VERSION: '24'

jobs:
  test:
    name: Lint + Test + Coverage
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_USER: admin
          RABBITMQ_DEFAULT_PASS: admin
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGODB_URI: mongodb://localhost:27017/catalog_test
      RABBITMQ_URL: amqp://admin:admin@localhost:5672
      RABBITMQ_PREFETCH: '10'
      CORRELATION_ID_HEADER: x-correlation-id
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run format:check --if-present
      - run: npm run test:cov
      - run: npm run test:bdd --if-present

      # TODO: integrar SonarQube Community Edition (self-hosted) para emitir relatórios.
      # SonarCloud removido temporariamente — voltar com `sonar-scanner` apontando para a instância community.

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
